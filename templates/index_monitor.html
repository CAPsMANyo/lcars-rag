<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LCARS Index Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 1.5rem; display: flex; flex-direction: column; height: 100vh; }
  h1 { color: #f9a825; margin-bottom: 0.5rem; }
  .stats { display: flex; gap: 2rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 1rem 1.5rem; min-width: 160px; }
  .stat-card .label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
  .stat-card .value { color: #f9a825; font-size: 1.5rem; font-weight: bold; margin-top: 0.25rem; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
  .status-running { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .status-stopped { background: #f44336; box-shadow: 0 0 6px #f44336; }
  .status-unknown { background: #666; }
  .log-container { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .log-header h2 { color: #f9a825; font-size: 1rem; }
  .log-actions { display: flex; gap: 0.5rem; align-items: center; }
  .log-actions button { background: #252540; color: #f9a825; border: 1px solid #333; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .log-actions button:hover { background: #333355; }
  .log-actions label { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 0.3rem; }
  .log-actions input[type="checkbox"] { accent-color: #f9a825; }
  #log-viewer { flex: 1; background: #111; border: 1px solid #333; border-radius: 6px; padding: 0.8rem; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.8rem; line-height: 1.5; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #ccc; min-height: 200px; }
</style>
</head>
<body>
<nav style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
  <a href="/" style="color:#888;text-decoration:none;padding:0.4rem 0.8rem;background:#1a1a2e;border-radius:4px;border:1px solid #333;">Status</a>
  <a href="/index" style="color:#f9a825;font-weight:bold;text-decoration:none;padding:0.4rem 0.8rem;background:#252540;border-radius:4px;border:1px solid #f9a825;">Index Monitor</a>
  <a href="/sync-log" style="color:#888;text-decoration:none;padding:0.4rem 0.8rem;background:#1a1a2e;border-radius:4px;border:1px solid #333;">Sync Log</a>
  <a href="/skip-report" style="color:#888;text-decoration:none;padding:0.4rem 0.8rem;background:#1a1a2e;border-radius:4px;border:1px solid #333;">Skip Report</a>
  <a href="/config" style="color:#888;text-decoration:none;padding:0.4rem 0.8rem;background:#1a1a2e;border-radius:4px;border:1px solid #333;">Config</a>
  <a href="/mcp-tools" style="color:#888;text-decoration:none;padding:0.4rem 0.8rem;background:#1a1a2e;border-radius:4px;border:1px solid #333;">MCP Tools</a>
</nav>
<h1>LCARS Index Monitor</h1>

<div class="stats" id="stats">
  <div class="stat-card">
    <div class="label">Status</div>
    <div class="value" id="status-value"><span class="status-dot status-unknown"></span>Loading...</div>
  </div>
  <div class="stat-card">
    <div class="label">PID</div>
    <div class="value" id="pid-value">--</div>
  </div>
  <div class="stat-card" style="display:flex;align-items:center;">
    <button id="update-btn" onclick="triggerUpdate()" style="background:#252540;color:#f9a825;border:1px solid #f9a825;padding:0.5rem 1.2rem;border-radius:4px;cursor:pointer;font-size:0.9rem;font-weight:bold;">Run Update</button>
  </div>
  <div class="stat-card" style="display:flex;align-items:center;">
    <button id="drop-btn" onclick="dropIndex()" style="background:#2a1010;color:#ff4444;border:2px solid #ff4444;padding:0.5rem 1.2rem;border-radius:4px;cursor:pointer;font-size:0.9rem;font-weight:bold;">Drop Index</button>
  </div>
</div>

<div id="drop-warning" style="display:none;background:#2a1010;border:2px solid #ff4444;border-radius:6px;padding:1rem;margin-bottom:1rem;color:#ff4444;">
  <strong>WARNING:</strong> Index drop in progress. All indexed data is being deleted. CocoIndex will rebuild from scratch after completion.
</div>

<div class="log-container">
  <div class="log-header">
    <h2>CocoIndex Logs</h2>
    <div class="log-actions">
      <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
      <button onclick="clearLog()">Clear View</button>
    </div>
  </div>
  <div id="log-viewer">Connecting...</div>
</div>

<script>
const logViewer = document.getElementById('log-viewer');
const statusValue = document.getElementById('status-value');
const pidValue = document.getElementById('pid-value');
const autoScrollCheckbox = document.getElementById('auto-scroll');

let logOffset = 0;
let initialLoad = true;

// Detect if user scrolled away from bottom
logViewer.addEventListener('scroll', function() {
  const atBottom = logViewer.scrollHeight - logViewer.scrollTop - logViewer.clientHeight < 30;
  autoScrollCheckbox.checked = atBottom;
});

function scrollToBottom() {
  if (autoScrollCheckbox.checked) {
    logViewer.scrollTop = logViewer.scrollHeight;
  }
}

function clearLog() {
  logViewer.textContent = '';
}

async function fetchStatus() {
  try {
    const resp = await fetch('/api/index/status');
    const data = await resp.json();
    let dotClass = 'status-unknown';
    let label = 'Unknown';
    if (data.status === 'updating') { dotClass = 'status-running'; label = 'Updating...'; }
    else if (data.status === 'running') { dotClass = 'status-running'; label = 'Running'; }
    else if (data.status === 'stopped') { dotClass = 'status-stopped'; label = 'Stopped'; }
    else if (data.status === 'not_started') { dotClass = 'status-stopped'; label = 'Not Started'; }
    statusValue.innerHTML = '<span class="status-dot ' + dotClass + '"></span>' + label;
    pidValue.textContent = data.pid || '--';
    // Disable button while one-shot update is running
    const btn = document.getElementById('update-btn');
    if (data.status === 'updating') {
      btn.disabled = true;
      btn.textContent = 'Updating...';
      btn.style.opacity = '0.6';
    } else if (btn.textContent === 'Updating...') {
      btn.disabled = false;
      btn.textContent = 'Run Update';
      btn.style.opacity = '1';
    }
    // Reset drop button when process resumes after a drop
    const dropBtn = document.getElementById('drop-btn');
    if (dropBtn.textContent === 'Dropping...' && (data.status === 'running' || data.status === 'not_started')) {
      dropBtn.disabled = false;
      dropBtn.textContent = 'Drop Index';
      dropBtn.style.opacity = '1';
      document.getElementById('drop-warning').style.display = 'none';
    }
  } catch (e) {
    statusValue.innerHTML = '<span class="status-dot status-unknown"></span>Error';
    pidValue.textContent = '--';
  }
}

async function fetchLogs() {
  try {
    const url = initialLoad
      ? '/api/index/logs?lines=200'
      : '/api/index/logs?offset=' + logOffset;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.content) {
      if (initialLoad) {
        logViewer.textContent = data.content;
        initialLoad = false;
      } else {
        logViewer.textContent += data.content;
      }
      scrollToBottom();
    }
    logOffset = data.offset;
  } catch (e) {
    // silently retry next cycle
  }
}

async function triggerUpdate() {
  const btn = document.getElementById('update-btn');
  btn.disabled = true;
  btn.textContent = 'Triggering...';
  btn.style.opacity = '0.6';
  try {
    const resp = await fetch('/api/index/update', { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = 'Triggered!';
      setTimeout(() => { fetchStatus(); }, 2000);
    } else {
      btn.textContent = 'Error';
    }
  } catch (e) {
    btn.textContent = 'Error';
  }
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Run Update';
    btn.style.opacity = '1';
  }, 5000);
}

async function dropIndex() {
  // First confirmation
  if (!confirm('WARNING: This will delete ALL indexed data from the vector database.\n\nThe index will need to be completely rebuilt afterwards.\n\nAre you sure you want to drop the entire index?')) {
    return;
  }
  // Second confirmation — require typing
  const typed = prompt('To confirm, type "DROP ALL DATA" exactly:');
  if (typed !== 'DROP ALL DATA') {
    if (typed !== null) alert('Confirmation did not match. Operation cancelled.');
    return;
  }

  const btn = document.getElementById('drop-btn');
  btn.disabled = true;
  btn.textContent = 'Dropping...';
  btn.style.opacity = '0.6';
  document.getElementById('drop-warning').style.display = 'block';

  try {
    const resp = await fetch('/api/index/drop', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({confirm: 'DROP ALL DATA'}),
    });
    const data = await resp.json();
    if (!data.ok) {
      alert('Drop failed: ' + (data.error || 'unknown error'));
      btn.disabled = false;
      btn.textContent = 'Drop Index';
      btn.style.opacity = '1';
      document.getElementById('drop-warning').style.display = 'none';
    }
    // Success — drop runs async, status polling will show progress in logs
  } catch (e) {
    alert('Error: ' + e);
    btn.disabled = false;
    btn.textContent = 'Drop Index';
    btn.style.opacity = '1';
    document.getElementById('drop-warning').style.display = 'none';
  }
}

// Initial fetch
fetchStatus();
fetchLogs();

// Poll intervals
setInterval(fetchStatus, 5000);
setInterval(fetchLogs, 2000);
</script>
</body>
</html>
