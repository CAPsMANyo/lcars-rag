name: Build and Push Docker Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'templates/**'
      - 'patterns.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'entrypoint.sh'
  pull_request:
    paths:
      - 'src/**'
      - 'templates/**'
      - 'patterns.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'entrypoint.sh'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment build status on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_STATUS: ${{ steps.build.outcome }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${HEAD_SHA:0:7}"
          MARKER="<!-- lcars-rag:docker-build-status -->"
          if [ "$BUILD_STATUS" = "success" ]; then
            HEADER="Docker build **passed** for \`$SHORT_SHA\`"
            DETAIL="Image built as \`sha-$SHORT_SHA\` (not pushed — PR builds are verification-only)."
          else
            HEADER="Docker build **failed** for \`$SHORT_SHA\`"
            DETAIL="See the [workflow run]($RUN_URL) for details."
          fi
          BODY="$MARKER
          $HEADER

          $DETAIL"
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.body | contains(\"$MARKER\")) | .id] | first // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$BODY" >/dev/null
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$BODY" >/dev/null
          fi
