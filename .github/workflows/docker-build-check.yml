name: Docker Build Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'templates/**'
      - 'patterns.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'entrypoint.sh'

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short

      - name: Build (verification only, no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment build status on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_STATUS: ${{ steps.build.outcome }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${HEAD_SHA:0:7}"
          MARKER="<!-- lcars-rag:docker-build-status -->"
          if [ "$BUILD_STATUS" = "success" ]; then
            HEADER="Docker build **passed** for \`$SHORT_SHA\`"
            DETAIL="Image built as \`sha-$SHORT_SHA\` (not pushed — PR builds are verification-only)."
          else
            HEADER="Docker build **failed** for \`$SHORT_SHA\`"
            DETAIL="See the [workflow run]($RUN_URL) for details."
          fi
          BODY="$MARKER
          $HEADER

          $DETAIL"
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.body | contains(\"$MARKER\")) | .id] | first // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$BODY" >/dev/null
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$BODY" >/dev/null
          fi
