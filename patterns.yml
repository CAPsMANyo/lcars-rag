docs:
  - "**/*.md"
  - "**/*.mdx"
  - "**/*.adoc"
  - "**/*.rst"
  - "**/*.txt"
  - "**/README"
  - "**/README.*"
  - "**/CHANGELOG.*"
  - "**/CONTRIBUTING.*"
exclude:
  # Version control
  - ".git"
  - "**/.git/**"
  # Dependencies / package managers
  - "**/node_modules/**"
  - "**/vendor/**"
  - "**/bower_components/**"
  - "**/.bundle/**"
  # Python artifacts
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/.eggs/**"
  - "**/*.egg-info/**"
  # Build output
  - "**/dist/**"
  - "**/build/**"
  - "**/target/**"
  - "**/out/**"
  - "**/_build/**"
  - "**/.next/**"
  - "**/.nuxt/**"
  # Compiled / object files
  - "**/*.o"
  - "**/*.so"
  - "**/*.dylib"
  - "**/*.dll"
  - "**/*.exe"
  - "**/*.a"
  - "**/*.lib"
  - "**/*.class"
  - "**/*.wasm"
  # Archives / compressed
  - "**/*.zip"
  - "**/*.tar"
  - "**/*.tar.gz"
  - "**/*.tgz"
  - "**/*.tar.bz2"
  - "**/*.tar.xz"
  - "**/*.gz"
  - "**/*.bz2"
  - "**/*.xz"
  - "**/*.7z"
  - "**/*.rar"
  - "**/*.jar"
  - "**/*.war"
  - "**/*.whl"
  # Images
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.bmp"
  - "**/*.ico"
  - "**/*.svg"
  - "**/*.webp"
  - "**/*.tiff"
  - "**/*.tif"
  # Fonts
  - "**/*.woff"
  - "**/*.woff2"
  - "**/*.ttf"
  - "**/*.otf"
  - "**/*.eot"
  # Audio / Video
  - "**/*.mp3"
  - "**/*.mp4"
  - "**/*.wav"
  - "**/*.avi"
  - "**/*.mov"
  - "**/*.mkv"
  - "**/*.flac"
  - "**/*.ogg"
  - "**/*.webm"
  # Documents / PDFs
  - "**/*.pdf"
  - "**/*.doc"
  - "**/*.docx"
  - "**/*.xls"
  - "**/*.xlsx"
  - "**/*.ppt"
  - "**/*.pptx"
  # Databases / data dumps
  - "**/*.db"
  - "**/*.sqlite"
  - "**/*.sqlite3"
  - "**/*.mdb"
  - "**/*.dump"
  - "**/*.bak"
  # Lock files (large, low signal)
  - "**/package-lock.json"
  - "**/*.lock"
  - "**/pnpm-lock.yaml"
  - "**/go.sum"
  # Minified files
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.bundle.js"
  - "**/*.chunk.js"
  # Source maps
  - "**/*.map"
  # IDE / editor config
  - "**/.vscode/**"
  - "**/.idea/**"
  - "**/.eclipse/**"
  - "**/.settings/**"
  # OS files
  - "**/.DS_Store"
  - "**/Thumbs.db"
  # Coverage / test artifacts
  - "**/.coverage"
  - "**/coverage/**"
  - "**/.nyc_output/**"
  - "**/htmlcov/**"
  # Misc binary / generated
  - "**/*.bin"
  - "**/*.dat"
  - "**/*.img"
  - "**/*.iso"
  - "**/*.dmg"
  - "**/*.msi"
  - "**/*.deb"
  - "**/*.rpm"
  - "**/*.snap"
  - "**/*.AppImage"
  - "**/*.pb"
  - "**/*.onnx"
  - "**/*.pt"
  - "**/*.pth"
  - "**/*.safetensors"
  - "**/*.gguf"
  # Generated code (high noise, low signal)
  - "**/*_pb2.py"
  - "**/*_pb2_grpc.py"
  - "**/*.pb.go"
  - "**/*_generated.go"
  - "**/*.generated.ts"
  - "**/*.generated.cs"
  - "**/*.Designer.cs"
  - "**/generated/**"
  - "**/gen/**"
  # Migration files (repetitive, low search value)
  - "**/migrations/**"
  - "**/db/migrate/**"
  # Test fixtures / snapshots (large, rarely useful in search)
  - "**/__snapshots__/**"
  - "**/fixtures/**"
  - "**/testdata/**"
  # Terraform state (sensitive + binary-ish)
  - "**/*.tfstate"
  - "**/*.tfstate.backup"
  - "**/.terraform/**"
  # Jupyter notebook checkpoints
  - "**/.ipynb_checkpoints/**"
  # Localization/Translation files
  - "**locales**"
  - "**translation**"
